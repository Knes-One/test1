<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>404 - Page Not Found</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow: hidden;
      width: 100%;
      height: 100vh;
    }
    
    .app {
      width: 100%;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
      background: linear-gradient(180deg, #FF8233 0%, #FDAC55 100%);
    }
    
    /* Background layer */
    .bg-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.8;
      -webkit-mask-image: linear-gradient(to bottom, black 40%, transparent 95%);
      mask-image: linear-gradient(to bottom, black 40%, transparent 95%);
    }
    
    .bg-content {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
    }
    
    .text-404 {
      position: absolute;
      color: #FFFFFF;
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.05em;
      white-space: nowrap;
      font-size: clamp(200px, 48vw, 800px);
      font-family: 'Inter', sans-serif;
    }
    
    .oval {
      position: absolute;
      border-radius: 50%;
      background-color: #FFFFFF;
      height: clamp(22vh, 26vh, 50vh);
      width: clamp(120px, 20vw, 400px);
    }
    
    /* Navigation */
    .nav {
      position: relative;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 16px;
    }
    
    @media (min-width: 640px) {
      .nav {
        padding: 20px 24px;
      }
    }
    
    @media (min-width: 768px) {
      .nav {
        padding: 20px 48px;
      }
    }
    
    .logo {
      display: flex;
      align-items: center;
    }
    
    .dots-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 2px;
    }
    
    .dot {
      width: 10px;
      height: 10px;
      background: white;
      border-radius: 50%;
    }
    
    @media (min-width: 640px) {
      .dot {
        width: 12px;
        height: 12px;
      }
    }
    
    .brand-name {
      color: white;
      font-weight: 700;
      font-size: 18px;
      margin-left: 4px;
    }
    
    @media (min-width: 640px) {
      .brand-name {
        font-size: 20px;
      }
    }
    
    .desktop-nav {
      display: none;
      align-items: center;
      gap: 4px;
    }
    
    @media (min-width: 768px) {
      .desktop-nav {
        display: flex;
      }
    }
    
    .nav-link {
      padding: 6px 16px;
      font-size: 14px;
      font-weight: 500;
      border-radius: 9999px;
      background: white;
      color: #F16524;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    
    .nav-link:hover {
      opacity: 0.9;
    }
    
    .menu-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border-radius: 9999px;
      background: #F16524;
      color: white;
      border: none;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: opacity 0.2s;
    }
    
    @media (min-width: 640px) {
      .menu-btn {
        padding: 10px 20px;
      }
    }
    
    .menu-btn:hover {
      opacity: 0.9;
    }
    
    .menu-text {
      font-size: 14px;
      font-weight: 500;
      display: none;
    }
    
    @media (min-width: 640px) {
      .menu-text {
        display: inline;
      }
    }
    
    /* Mobile Menu */
    .mobile-overlay {
      position: fixed;
      inset: 0;
      z-index: 50;
      pointer-events: none;
    }
    
    .mobile-overlay.active {
      pointer-events: auto;
    }
    
    .backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    
    .mobile-overlay.active .backdrop {
      opacity: 1;
    }
    
    .panel {
      position: absolute;
      top: 0;
      right: 0;
      height: 100%;
      width: 100%;
      background: linear-gradient(135deg, #FF6B1A 0%, #FF9642 100%);
      transform: translateX(100%);
      transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    @media (min-width: 640px) {
      .panel {
        width: 380px;
      }
    }
    
    .mobile-overlay.active .panel {
      transform: translateX(0);
    }
    
    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
    }
    
    .close-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    
    .close-btn:hover {
      background: rgba(255, 255, 255, 0.3);
    }
    
    .menu-items {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 0 16px;
      margin-top: 16px;
    }
    
    .menu-item {
      padding: 16px 24px;
      font-size: 18px;
      font-weight: 600;
      color: white;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.1);
      text-decoration: none;
      transition: all 0.3s;
      opacity: 0;
      transform: translateY(16px);
    }
    
    .mobile-overlay.active .menu-item {
      opacity: 1;
      transform: translateY(0);
    }
    
    .menu-item:hover {
      background: rgba(255, 255, 255, 0.2);
    }
    
    .panel-cta {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 24px;
      opacity: 0;
      transform: translateY(16px);
      transition: all 0.5s;
    }
    
    .mobile-overlay.active .panel-cta {
      opacity: 1;
      transform: translateY(0);
      transition-delay: 0.45s;
    }
    
    .cta-link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 16px;
      border-radius: 9999px;
      background: white;
      color: #F16524;
      font-weight: 600;
      font-size: 16px;
      text-decoration: none;
      transition: transform 0.2s;
    }
    
    .cta-link:hover {
      transform: scale(1.02);
    }
    
    /* Video */
    .video-container {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      margin-top: calc(-6vh - 40px);
    }
    
    .video-wrapper {
      width: 120vw;
      height: 85vh;
    }
    
    @media (min-width: 640px) {
      .video-wrapper {
        width: 70vw;
        height: 70vh;
      }
    }
    
    @media (min-width: 768px) {
      .video-wrapper {
        width: 62vw;
        height: 78vh;
      }
    }
    
    .video-wrapper video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
      mix-blend-mode: darken;
    }
    
    /* Bottom */
    .bottom-content {
      position: relative;
      z-index: 30;
      margin-top: auto;
      padding-bottom: 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding-left: 16px;
      padding-right: 16px;
    }
    
    @media (min-width: 640px) {
      .bottom-content {
        padding-bottom: 64px;
      }
    }
    
    .heading {
      color: white;
      font-size: 18px;
      font-weight: 500;
      margin-bottom: 12px;
    }
    
    @media (min-width: 640px) {
      .heading {
        font-size: 20px;
        margin-bottom: 16px;
      }
    }
    
    @media (min-width: 768px) {
      .heading {
        font-size: 24px;
      }
    }
    
    .home-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      border-radius: 9999px;
      background: #F16524;
      color: white;
      font-weight: 600;
      font-size: 14px;
      text-decoration: none;
      transition: all 0.2s;
    }
    
    @media (min-width: 640px) {
      .home-btn {
        padding: 16px 32px;
        font-size: 16px;
      }
    }
    
    .home-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
    }
    
    /* SVG icons */
    .icon {
      display: inline-block;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Background Layer -->
    <div class="bg-layer">
      <div class="bg-content">
        <div class="text-404" id="text404">404</div>
        <div class="oval"></div>
      </div>
    </div>
    
    <!-- Navigation -->
    <nav class="nav">
      <div class="logo">
        <div class="dots-grid">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
        <span class="brand-name">TinyTrails</span>
      </div>
      
      <div class="desktop-nav">
        <a href="#" class="nav-link">About Us</a>
        <a href="#" class="nav-link">Programs</a>
        <a href="#" class="nav-link">Reviews</a>
        <a href="#" class="nav-link">FAQ</a>
        <a href="#" class="nav-link">Contacts</a>
      </div>
      
      <button class="menu-btn" onclick="openMenu()">
        <svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
        <span class="menu-text">Menu</span>
      </button>
    </nav>
    
    <!-- Mobile Menu Overlay -->
    <div class="mobile-overlay" id="mobileOverlay">
      <div class="backdrop" onclick="closeMenu()"></div>
      <div class="panel">
        <div class="panel-header">
          <div class="logo">
            <div class="dots-grid">
              <div class="dot"></div>
              <div class="dot"></div>
              <div class="dot"></div>
              <div class="dot"></div>
            </div>
            <span class="brand-name">TinyTrails</span>
          </div>
          <button class="close-btn" onclick="closeMenu()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>
        
        <div class="menu-items">
          <a href="#" class="menu-item" style="transition-delay: 0.15s">About Us</a>
          <a href="#" class="menu-item" style="transition-delay: 0.21s">Programs</a>
          <a href="#" class="menu-item" style="transition-delay: 0.27s">Reviews</a>
          <a href="#" class="menu-item" style="transition-delay: 0.33s">FAQ</a>
          <a href="#" class="menu-item" style="transition-delay: 0.39s">Contacts</a>
        </div>
        
        <div class="panel-cta">
          <a href="/" class="cta-link">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="19" y1="12" x2="5" y2="12"></line>
              <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            Back to Home
          </a>
        </div>
      </div>
    </div>
    
    <!-- Video -->
    <div class="video-container">
      <div class="video-wrapper">
        <video autoplay loop muted playsinline>
          <source src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260713_234424_b1332b69-2e69-4302-8dbc-40f86846afbd.mp4" type="video/mp4">
        </video>
      </div>
    </div>
    
    <!-- Bottom Content -->
    <div class="bottom-content">
      <h2 class="heading">Oops, something went wrong!</h2>
      <a href="/" class="home-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Back to Home
      </a>
    </div>
  </div>
  
  <script>
    // Dynamic scaling for 404 text and oval
    function updateScale() {
      const text404 = document.getElementById('text404');
      const oval = document.querySelector('.oval');
      
      if (text404) {
        const textHeight = text404.offsetHeight;
        const viewportHeight = window.innerHeight;
        
        if (textHeight > 0) {
          const scaleY = (viewportHeight / textHeight) * 1.4;
          
          text404.style.transform = `scale(1.15, ${scaleY * 1.4})`;
          oval.style.transform = `scale(1, ${scaleY})`;
        }
      }
    }
    
    // Mobile menu functions
    function openMenu() {
      document.getElementById('mobileOverlay').classList.add('active');
      document.body.style.overflow = 'hidden';
    }
    
    function closeMenu() {
      document.getElementById('mobileOverlay').classList.remove('active');
      document.body.style.overflow = 'hidden';
    }
    
    // Run on load and resize
    window.addEventListener('load', updateScale);
    window.addEventListener('resize', updateScale);
    
    // Close menu on Escape key
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        closeMenu();
      }
    });
  </script>
</body>
</html>
